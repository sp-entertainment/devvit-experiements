<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Devvit Kitchen Sink</title>
  </head>
  <body class="app">
    <div id="app-version" class="app-version" aria-label="App version"></div>
    <img class="snoo" src="/snoo.png" alt="Snoo" />
    <div class="content">
      <h1 class="title" id="title"></h1>
      <p class="description">
        Explore Reddit, Redis, Realtime, Phaser, and other Devvit Web APIs.
      </p>
    </div>
    <div>
      <button class="start-button" id="start-button">Start</button>
    </div>
    <footer class="footer">
      <button type="button" class="docs-link" id="docs-link">Docs</button>
      <span class="divider">|</span>
      <button type="button" class="docs-link" id="playtest-link">
        r/Devvit
      </button>
      <span class="divider">|</span>
      <button type="button" class="docs-link" id="discord-link">Discord</button>
    </footer>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
